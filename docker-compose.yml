services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AccountingDatabase: Host=postgres;Port=5432;Database=normalization;Username=normalizer;Password=normalizer_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: normalization
      POSTGRES_USER: normalizer
      POSTGRES_PASSWORD: normalizer_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U normalizer -d normalization"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
